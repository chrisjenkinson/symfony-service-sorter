name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  tests:
    name: "Symfony ${{ matrix.symfony }} / PHP ${{ matrix.php }}"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # Symfony 6.4 LTS — PHP 8.2, 8.3, 8.4
          - symfony: '6.4'
            php: '8.2'
          - symfony: '6.4'
            php: '8.3'
          - symfony: '6.4'
            php: '8.4'
          # Symfony 7.4 LTS — PHP 8.2, 8.3, 8.4
          - symfony: '7.4'
            php: '8.2'
          - symfony: '7.4'
            php: '8.3'
          - symfony: '7.4'
            php: '8.4'
          # Symfony 8.0 — PHP 8.4
          - symfony: '8.0'
            php: '8.4'

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Pin Symfony version and install dependencies
        run: |
          composer update \
            --with "symfony/console:^${{ matrix.symfony }}" \
            --prefer-dist \
            --no-progress

      - name: Run PHPStan
        run: ./vendor/bin/phpstan analyse

      - name: Run ECS
        run: ./vendor/bin/ecs check

      - name: Run tests
        run: ./vendor/bin/phpunit --testdox

      - name: Run infection
        run: ./vendor/bin/infection --threads=max --min-msi=78 --min-covered-msi=90